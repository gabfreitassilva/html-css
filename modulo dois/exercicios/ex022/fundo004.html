<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posicionamento</title>
    <style>
        body {
            background-image: url(imagens/wallpaper003.jpg);
            background-size: 1366px 680px;
            background-repeat: no-repeat;
            display: flex;

        }

        div.esquerdaTop {
            height: 110px;
            width: 100px;
            background-image: url('https://gustavoguanabara.github.io/html-css/imagens/mascote.png');
            background-repeat: no-repeat;
            background-size: 100px 100px;
            background-position: left top;
            display: flex;
        }
        div.direitaTop {
            height: 110px;
            width: 100px;
            background-image: url('https://gustavoguanabara.github.io/html-css/imagens/mascote.png');
            background-repeat: no-repeat;
            background-size: 100px 100px;
            background-position: right top;
            display: flex;
        }
        div.direitaBottom {
            width: 100px;
            height: 110px;
            background-image: url('https://gustavoguanabara.github.io/html-css/imagens/mascote.png');
            background-size: 100px 100px;
            background-repeat: no-repeat;
            background-position: right bottom;
            display: flex;
        }
        div.esquerdaBottom {
            width: 100px;
            height: 110px;
            background-image: url('https://gustavoguanabara.github.io/html-css/imagens/mascote.png');
            background-repeat: no-repeat;
            background-size: 100px 100px;
            background-position: left bottom;
        }
        div.centroCenter {
            background-image: url('https://gustavoguanabara.github.io/html-css/imagens/mascote.png');
            background-size: 100px 100px;
            background-repeat: no-repeat;
        }

    </style>
</head>
<body>
    <div class="esquerdaTop"></div>
    <div class="direitaTop"></div>
    <div class="direitaBottom"></div>
    <div class="esquerdaBottom"></div>
    <div class="centroCenter"></div>
</body>
</html>
