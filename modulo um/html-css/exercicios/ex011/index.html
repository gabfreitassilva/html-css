<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em HTML5</title>
</head>
<body>
    <h1>Imagem dinamica</h1>
    <p>Abra o site em dispositivos com tamanhos diferentes ou apenas só aumente e dimunua o tamanho do navegador.</p>

    <picture>
        <source media="(max-width: 730px)" srcset="imagens/teste-300.png" type="image/png">
        <source media="(max-width: 1030px)" srcset="imagens/teste-700.png" type="image/png">
        <img src="imagens/teste-1000.png" alt="imagem grande">
    </picture>

    <h1>Reproduzindo audios</h1>
    <p>Vamos aprender a reproduzir audios dentro do nosso site</p>
    <audio preload="auto" controls loop>
        <source src="midias/bird_whistle.mp3" type="audio/mp3">
        <source src="midias/bird_whistle.ogg" type="audio/ogg">
        <source src="midias/bird_whistle.wav" type="audio/wav">
        <p>Navegador não compativel com audio.</p>
    </audio>
</body>
</html>
