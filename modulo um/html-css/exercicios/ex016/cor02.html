<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradiente em CSS</title>
    <style>
        * { /* configuração global */
            height: auto;
        }
        body {
            background-image: linear-gradient(to left, #F2E29F, #FADF7F, #D9B26F, #A69658, #795C5F);
            background-attachment: fixed;
            text-align: center; /* brincando um pouco hehe */
        }
    </style>
</head>
<body>
    <h1>Testando Gradiente</h1>
    <p>Design is my passion</p>
</body>
</html>
