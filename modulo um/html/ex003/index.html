<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste com imagens</title>
</head>
<body>
    <h1>Testando carga e Imagem</h1>
    <p>abaixo você vai ver uma imagem que está na mesma pasta:</p>
    <img src="logo-html.png" alt="Logo HTML5">
    <p>agora uma imagem que está em uma sub-pasta:</p>
    <img src="img/logo-css.png" alt="Logo CSS3">
    <p>também podemos carregar imagens externas:</p>
    <img src="https://www.seekpng.com/png/full/80-803501_javascript-logo-logo-de-java-script-png.png" alt="Logo JavaScript">
</body>
</html>
